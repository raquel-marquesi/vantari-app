<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@500;600;700&family=JetBrains+Mono:wght@500;700&display=swap">
<style>
*{box-sizing:border-box}body{margin:0;font-family:Inter,sans-serif;background:white;padding:18px;display:grid;grid-template-columns:240px 1fr;gap:24px;align-items:center}
.host{position:relative;width:220px;height:220px}
.ring{width:220px;height:220px}
.c{position:absolute;inset:0;display:grid;place-items:center;text-align:center;pointer-events:none}
.num{font-family:Sora;font-size:32px;font-weight:700;letter-spacing:-.03em;color:#0e1a24}
.lbl{font-size:10.5px;color:#8696a5;font-weight:600;text-transform:uppercase;letter-spacing:.08em}
.leg{display:flex;flex-direction:column;gap:8px}
.rl{display:grid;grid-template-columns:14px 1fr auto;align-items:center;gap:10px;padding:8px 12px;background:#f5f8fb;border-radius:10px}
.rl i{width:14px;height:14px;border-radius:50%;background:var(--c)}
.nm{font-size:12px;color:#5a6b7a;font-weight:600}
.dv{font-size:11px;color:#8696a5;font-family:'JetBrains Mono'}
.va{font-family:Sora;font-weight:700;font-size:18px;color:#0e1a24;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
</style></head><body>

<div class="host">
  <svg class="ring" viewBox="0 0 220 220">
    <g transform="translate(110,110)">
      <circle r="95" fill="none" stroke="#0d749120" stroke-width="14"/>
      <circle r="95" fill="none" stroke="#0d7491" stroke-width="14" stroke-linecap="round" stroke-dasharray="596.9" stroke-dashoffset="392.7" transform="rotate(-90)"/>
      <circle r="75" fill="none" stroke="#14a27320" stroke-width="14"/>
      <circle r="75" fill="none" stroke="#14a273" stroke-width="14" stroke-linecap="round" stroke-dasharray="471.2" stroke-dashoffset="427.0" transform="rotate(-90)"/>
      <circle r="55" fill="none" stroke="#7c5cff20" stroke-width="14"/>
      <circle r="55" fill="none" stroke="#7c5cff" stroke-width="14" stroke-linecap="round" stroke-dasharray="345.6" stroke-dashoffset="103.7" transform="rotate(-90)"/>
    </g>
  </svg>
  <div class="c"><div><div class="num">595</div><div class="lbl">conversões<br>este mês</div></div></div>
</div>

<div class="leg">
  <div class="rl" style="--c:#0d7491"><i></i><div><div class="nm">Abertura média</div><div class="dv">+2.1pp vs anterior</div></div><div class="va">34.2%</div></div>
  <div class="rl" style="--c:#14a273"><i></i><div><div class="nm">CTR médio</div><div class="dv">+0.8pp vs anterior</div></div><div class="va">9.4%</div></div>
  <div class="rl" style="--c:#7c5cff"><i></i><div><div class="nm">Conversões</div><div class="dv">este mês</div></div><div class="va">595</div></div>
  <div class="rl" style="--c:#f59e0b"><i></i><div><div class="nm">Campanhas</div><div class="dv">1 pausada · 1 encerrada</div></div><div class="va">3</div></div>
</div>

</body></html>
