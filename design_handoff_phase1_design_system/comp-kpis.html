<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@500;600;700&family=JetBrains+Mono:wght@500;700&display=swap">
<style>
*{box-sizing:border-box}body{margin:0;font-family:Inter,sans-serif;background:white;padding:20px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.kpi{background:white;border-radius:14px;padding:14px 16px 0;border:1px solid #e8eef3;box-shadow:0 1px 0 rgba(14,26,36,.03),0 8px 24px -16px rgba(14,26,36,.08);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--c)}
.h{display:flex;justify-content:space-between;align-items:center}
.ic{width:32px;height:32px;background:var(--cb);color:var(--c);border-radius:9px;display:grid;place-items:center}
.ic svg{width:16px;height:16px}
.tr{font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;font-family:'JetBrains Mono'}
.tr.up{background:rgba(20,162,115,.1);color:#14a273}
.v{font-family:Sora;font-weight:700;font-size:28px;line-height:1;letter-spacing:-.03em;color:#0e1a24;margin:10px 0 3px;font-variant-numeric:tabular-nums}
.l{font-size:11.5px;color:#5a6b7a;font-weight:600}
.s{font-size:10.5px;color:var(--c);font-weight:700;font-family:'JetBrains Mono';margin:1px 0 8px}
.sp{height:36px;margin:0 -16px -1px;display:block}
</style></head><body>

<div class="kpi" style="--c:#0d7491;--cb:#0d749114">
  <div class="h"><div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/></svg></div><span class="tr up">↗ 12.4%</span></div>
  <div class="v">5.640</div><div class="l">Total de Leads</div><div class="s">+623 vs anterior</div>
  <svg class="sp" viewBox="0 0 220 36" preserveAspectRatio="none"><defs><linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0d7491" stop-opacity=".3"/><stop offset="1" stop-color="#0d7491" stop-opacity="0"/></linearGradient></defs><path d="M0,28 L40,24 L80,20 L120,18 L160,12 L200,8 L220,6 L220,36 L0,36 Z" fill="url(#g1)"/><path d="M0,28 L40,24 L80,20 L120,18 L160,12 L200,8 L220,6" stroke="#0d7491" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
</div>

<div class="kpi" style="--c:#f59e0b;--cb:#f59e0b14">
  <div class="h"><div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polygon points="12 2 15 8.5 22 9.3 17 14 18.2 21 12 17.8 5.8 21 7 14 2 9.3 9 8.5 12 2"/></svg></div><span class="tr up">↗ 8.7%</span></div>
  <div class="v">236</div><div class="l">MQLs este mês</div><div class="s">Taxa MQL · 4.2%</div>
  <svg class="sp" viewBox="0 0 220 36" preserveAspectRatio="none"><defs><linearGradient id="g2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f59e0b" stop-opacity=".3"/><stop offset="1" stop-color="#f59e0b" stop-opacity="0"/></linearGradient></defs><path d="M0,22 L40,18 L80,24 L120,12 L160,16 L200,8 L220,10 L220,36 L0,36 Z" fill="url(#g2)"/><path d="M0,22 L40,18 L80,24 L120,12 L160,16 L200,8 L220,10" stroke="#f59e0b" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
</div>

<div class="kpi" style="--c:#7c5cff;--cb:#7c5cff14">
  <div class="h"><div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div><span class="tr up">↗ 15.2%</span></div>
  <div class="v">101</div><div class="l">SQLs qualificados</div><div class="s">Taxa SQL · 1.8%</div>
  <svg class="sp" viewBox="0 0 220 36" preserveAspectRatio="none"><defs><linearGradient id="g3" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#7c5cff" stop-opacity=".3"/><stop offset="1" stop-color="#7c5cff" stop-opacity="0"/></linearGradient></defs><path d="M0,30 L40,26 L80,20 L120,16 L160,10 L200,6 L220,4 L220,36 L0,36 Z" fill="url(#g3)"/><path d="M0,30 L40,26 L80,20 L120,16 L160,10 L200,6 L220,4" stroke="#7c5cff" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
</div>

<div class="kpi" style="--c:#14a273;--cb:#14a27314">
  <div class="h"><div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div><span class="tr up">↗ 3.1%</span></div>
  <div class="v">1,67<span style="font-size:18px;color:#5a6b7a">%</span></div><div class="l">Taxa de Conversão</div><div class="s">R$ 136k receita</div>
  <svg class="sp" viewBox="0 0 220 36" preserveAspectRatio="none"><defs><linearGradient id="g4" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#14a273" stop-opacity=".3"/><stop offset="1" stop-color="#14a273" stop-opacity="0"/></linearGradient></defs><path d="M0,24 L40,22 L80,18 L120,16 L160,12 L200,8 L220,6 L220,36 L0,36 Z" fill="url(#g4)"/><path d="M0,24 L40,22 L80,18 L120,16 L160,12 L200,8 L220,6" stroke="#14a273" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
</div>

</body></html>
